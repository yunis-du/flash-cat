name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ====================
  # Linux
  # ====================
  build-linux:
    name: Linux - ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            deb_arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            deb_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo tools
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cargo install cargo-deb cargo-generate-rpm

      - name: Setup cross config
        run: |
          cat > Cross.toml <<'EOF'
          [target.x86_64-unknown-linux-musl]
          pre-build = ["apt-get update && apt-get install -y protobuf-compiler"]

          [target.aarch64-unknown-linux-musl]
          pre-build = ["apt-get update && apt-get install -y protobuf-compiler"]
          EOF

      - name: Build CLI
        run: cross build --release -p flash_cat_cli --target ${{ matrix.target }}

      - name: Build deb package
        run: cargo deb -p flash_cat_cli --no-build --variant ${{ matrix.target }} --target ${{ matrix.target }}

      - name: Build rpm package
        run: cargo generate-rpm -p cli --variant ${{ matrix.target }} --target ${{ matrix.target }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package CLI
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../flash-cat-cli-linux-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz flash-cat

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-${{ matrix.arch }}
          path: flash-cat-cli-*.tar.gz

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: target/${{ matrix.target }}/debian/*.deb

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: target/${{ matrix.target }}/generate-rpm/*.rpm

  # ====================
  # macOS
  # ====================
  build-macos:
    name: macOS - ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build CLI
        run: cargo build --release -p flash_cat_cli --target ${{ matrix.target }}

      - name: Build APP
        run: cargo build --release -p flash_cat_app --target ${{ matrix.target }}

      - name: Package APP
        run: cargo packager --release -p flash_cat_app --target ${{ matrix.target }} --formats dmg

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package CLI
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../flash-cat-cli-macos-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz flash-cat

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-${{ matrix.arch }}
          path: flash-cat-cli-*.tar.gz

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/*.dmg

  # ====================
  # Windows
  # ====================
  build-windows:
    name: Windows - ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x86_64
          - target: i686-pc-windows-msvc
            arch: i686

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-packager
        if: matrix.arch == 'x86_64'
        run: cargo install cargo-packager --locked

      - name: Install NSIS
        if: matrix.arch == 'x86_64'
        run: choco install nsis -y

      - name: Build CLI
        run: cargo build --release -p flash_cat_cli --target ${{ matrix.target }}

      - name: Build APP
        if: matrix.arch == 'x86_64'
        run: cargo build --release -p flash_cat_app --target ${{ matrix.target }}

      - name: Package APP
        if: matrix.arch == 'x86_64'
        run: cargo packager --release -p flash_cat_app --target ${{ matrix.target }} --formats nsis

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package CLI
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path flash-cat.exe -DestinationPath ../../../flash-cat-cli-windows-${{ steps.version.outputs.version }}-${{ matrix.arch }}.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-${{ matrix.arch }}
          path: flash-cat-cli-*.zip

      - name: Upload APP artifact
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: app-windows-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/*.exe

  # ====================
  # Create Release
  # ====================
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Collect all files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" \) -exec cp {} release/ \;
          # Only copy NSIS installer (exclude raw exe)
          find artifacts -type f -name "*setup*.exe" -exec cp {} release/ \;
          find artifacts -type f -name "*installer*.exe" -exec cp {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Fetch auto-generated release notes from GitHub
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${GITHUB_REF#refs/tags/}" \
            -f target_commitish="${GITHUB_SHA}" \
            -q .body > gh_notes.md || echo "" > gh_notes.md

          # 2. Parse and group commits using Python
          python3 -c '
          import os

          try:
              lines = open("gh_notes.md").read().split("\n")
          except Exception:
              lines = []

          features, fixes, opts = [], [], []

          for line in lines:
              if line.strip().startswith("* "):
                  content = line[2:].strip()
                  # Remove the trailing " by @user in https..."
                  if " by @" in content:
                      content = content.split(" by @")[0]

                  lower_content = content.lower()
                  if lower_content.startswith("feat:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: features.append("- " + msg[0].upper() + msg[1:])
                  elif lower_content.startswith("fix:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: fixes.append("- " + msg[0].upper() + msg[1:])
                  elif lower_content.startswith("perf:") or lower_content.startswith("opt:"):
                      msg = content.split(":", 1)[1].strip()
                      if msg: opts.append("- " + msg[0].upper() + msg[1:])

          with open("grouped_notes.md", "w", encoding="utf-8") as f:
              if features:
                  f.write("### ✨ New Features\n\n" + "\n".join(features) + "\n\n")
              if fixes:
                  f.write("### 🐛 Bug Fixes\n\n" + "\n".join(fixes) + "\n\n")
              if opts:
                  f.write("### 🔧 Optimizations\n\n" + "\n".join(opts) + "\n\n")
          '

          # 3. Rename grouped notes to release notes
          mv grouped_notes.md release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish packages to download server
        env:
          PKG_SERVER_HOST: ${{ secrets.PKG_SERVER_HOST }}
          PKG_SERVER_USER: ${{ secrets.PKG_SERVER_USER }}
          PKG_SERVER_PORT: ${{ secrets.PKG_SERVER_PORT }}
          PKG_SERVER_SSH_KEY: ${{ secrets.PKG_SERVER_SSH_KEY }}
          APT_REPO_PASSPHRASE: ${{ secrets.APT_REPO_PASSPHRASE }}
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          : "${PKG_SERVER_HOST:?PKG_SERVER_HOST secret is required}"
          : "${PKG_SERVER_USER:?PKG_SERVER_USER secret is required}"
          : "${PKG_SERVER_SSH_KEY:?PKG_SERVER_SSH_KEY secret is required}"
          : "${APT_REPO_PASSPHRASE:?APT_REPO_PASSPHRASE secret is required}"
          : "${APT_REPO_GPG_PRIVATE_KEY:?APT_REPO_GPG_PRIVATE_KEY secret is required}"

          PKG_SERVER_PORT="${PKG_SERVER_PORT:-22}"
          ARCHIVE="flash-cat-${VERSION}-release.tar.gz"
          REMOTE_ARCHIVE="/tmp/${ARCHIVE}"

          test -f "release/flash-cat_${VERSION}-1_amd64.deb"
          test -f "release/flash-cat_${VERSION}-1_arm64.deb"
          test -f "release/flash-cat-${VERSION}-1.el8.x86_64.rpm"
          test -f "release/flash-cat-${VERSION}-1.el8.aarch64.rpm"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PKG_SERVER_SSH_KEY}" | tr -d '\r' > ~/.ssh/flash-cat-release
          chmod 600 ~/.ssh/flash-cat-release
          ssh-keyscan -p "${PKG_SERVER_PORT}" "${PKG_SERVER_HOST}" >> ~/.ssh/known_hosts
          SSH_OPTS=(
            -i ~/.ssh/flash-cat-release
            -p "${PKG_SERVER_PORT}"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )

          tar -czf "${ARCHIVE}" -C release .
          echo "Testing SSH connection..."
          ssh "${SSH_OPTS[@]}" "${PKG_SERVER_USER}@${PKG_SERVER_HOST}" "echo SSH connection OK"
          echo "Uploading release archive..."
          ssh "${SSH_OPTS[@]}" "${PKG_SERVER_USER}@${PKG_SERVER_HOST}" "cat > '${REMOTE_ARCHIVE}'" < "${ARCHIVE}"

          APT_REPO_PASSPHRASE_B64="$(printf '%s' "${APT_REPO_PASSPHRASE}" | base64 -w0)"
          APT_REPO_GPG_PRIVATE_KEY_B64="$(printf '%s' "${APT_REPO_GPG_PRIVATE_KEY}" | base64 -w0)"
          echo "Publishing packages on remote server..."
          ssh "${SSH_OPTS[@]}" "${PKG_SERVER_USER}@${PKG_SERVER_HOST}" \
            VERSION="${VERSION}" \
            REMOTE_ARCHIVE="${REMOTE_ARCHIVE}" \
            APT_REPO_PASSPHRASE_B64="${APT_REPO_PASSPHRASE_B64}" \
            APT_REPO_GPG_PRIVATE_KEY_B64="${APT_REPO_GPG_PRIVATE_KEY_B64}" \
            'bash -s' <<'EOF'
          set -Eeuo pipefail
          trap 'echo "Remote publish failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

          BASE_DIR="/opt/pkg/flash-cat"
          VERSION_DIR="${BASE_DIR}/${VERSION}"
          RPM_REPO_BASE="/repo/rpm/flash-cat"
          APT_REPO_PASSPHRASE="$(printf '%s' "${APT_REPO_PASSPHRASE_B64}" | base64 -d)"
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          APT_REPO_PASSPHRASE_FILE="${GNUPGHOME}/passphrase"
          GPG_WRAPPER_DIR="$(mktemp -d)"
          GPG_REAL="$(command -v gpg)"
          export APT_REPO_PASSPHRASE_FILE GPG_REAL
          REPREPRO_CMD="$(command -v eprepro || command -v reprepro)"
          CREATEREPO_CMD="$(command -v createrepo_c)"
          trap 'rm -rf "${GNUPGHOME}" "${GPG_WRAPPER_DIR}"' EXIT

          echo "Using apt repo command: ${REPREPRO_CMD}"
          echo "Using rpm repo command: ${CREATEREPO_CMD}"
          echo "Using gpg command: ${GPG_REAL}"
          echo "Importing apt repository signing key..."
          chmod 700 "${GNUPGHOME}"
          printf '%s\n' "${APT_REPO_PASSPHRASE}" > "${APT_REPO_PASSPHRASE_FILE}"
          chmod 600 "${APT_REPO_PASSPHRASE_FILE}"
          printf '%s' "${APT_REPO_GPG_PRIVATE_KEY_B64}" | base64 -d | gpg --batch --import
          gpg --batch --list-secret-keys
          cat > "${GPG_WRAPPER_DIR}/gpg" <<'GPG_EOF'
          #!/usr/bin/env bash
          exec "${GPG_REAL}" --batch --pinentry-mode loopback --passphrase-file "${APT_REPO_PASSPHRASE_FILE}" "$@"
          GPG_EOF
          chmod 700 "${GPG_WRAPPER_DIR}/gpg"
          export PATH="${GPG_WRAPPER_DIR}:${PATH}"

          echo "Extracting release archive to ${VERSION_DIR}..."
          mkdir -p "${VERSION_DIR}"
          tar -xzf "${REMOTE_ARCHIVE}" -C "${VERSION_DIR}"
          rm -f "${REMOTE_ARCHIVE}"
          ls -la "${VERSION_DIR}"

          test -f "${VERSION_DIR}/flash-cat_${VERSION}-1_amd64.deb"
          test -f "${VERSION_DIR}/flash-cat_${VERSION}-1_arm64.deb"
          test -f "${VERSION_DIR}/flash-cat-${VERSION}-1.el8.x86_64.rpm"
          test -f "${VERSION_DIR}/flash-cat-${VERSION}-1.el8.aarch64.rpm"

          echo "Updating latest version..."
          printf '%s\n' "${VERSION}" > "${BASE_DIR}/latest"

          echo "Publishing rpm packages..."
          mkdir -p "${RPM_REPO_BASE}/aarch64" "${RPM_REPO_BASE}/x86_64"
          cp "${VERSION_DIR}/flash-cat-${VERSION}-1.el8.aarch64.rpm" "${RPM_REPO_BASE}/aarch64/"
          cp "${VERSION_DIR}/flash-cat-${VERSION}-1.el8.x86_64.rpm" "${RPM_REPO_BASE}/x86_64/"
          "${CREATEREPO_CMD}" --update "${RPM_REPO_BASE}/aarch64/"
          "${CREATEREPO_CMD}" --update "${RPM_REPO_BASE}/x86_64/"

          cd /repo/apt
          echo "Removing old apt package if it exists..."
          "${REPREPRO_CMD}" -Vb . remove flash-cat flash-cat || true

          echo "Publishing apt package: amd64..."
          "${REPREPRO_CMD}" -Vb . includedeb flash-cat "${VERSION_DIR}/flash-cat_${VERSION}-1_amd64.deb"
          echo "Publishing apt package: arm64..."
          "${REPREPRO_CMD}" -Vb . includedeb flash-cat "${VERSION_DIR}/flash-cat_${VERSION}-1_arm64.deb"

          echo "Remote publish complete."
          EOF

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          : "${HOMEBREW_TAP_TOKEN:?HOMEBREW_TAP_TOKEN secret is required}"

          test -f "release/flash-cat-cli-macos-${VERSION}-x86_64.tar.gz"
          test -f "release/flash-cat-cli-macos-${VERSION}-aarch64.tar.gz"

          MACOS_X86_SHA="$(sha256sum "release/flash-cat-cli-macos-${VERSION}-x86_64.tar.gz" | awk '{print $1}')"
          MACOS_ARM_SHA="$(sha256sum "release/flash-cat-cli-macos-${VERSION}-aarch64.tar.gz" | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yunis-du/homebrew-brew.git" homebrew-brew
          cd homebrew-brew

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p Formula
          cat > Formula/flash-cat.rb <<EOF
          class FlashCat < Formula
            desc "Send things from one computer to another"
            homepage "https://github.com/yunis-du/flash-cat"
            version "${VERSION}"

            if Hardware::CPU.intel?
              url "https://github.com/yunis-du/flash-cat/releases/download/v#{version}/flash-cat-cli-macos-#{version}-x86_64.tar.gz"
              sha256 "${MACOS_X86_SHA}"
            elsif Hardware::CPU.arm?
              url "https://github.com/yunis-du/flash-cat/releases/download/v#{version}/flash-cat-cli-macos-#{version}-aarch64.tar.gz"
              sha256 "${MACOS_ARM_SHA}"
            end

            def install
              if Hardware::CPU.intel?
                bin.install "flash-cat"
              elsif Hardware::CPU.arm?
                bin.install "flash-cat"
              end
            end
          end
          EOF

          if git diff --quiet; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi

          git add Formula/flash-cat.rb
          git commit -m "Update flash-cat to ${VERSION}"
          TAP_BRANCH="$(git branch --show-current)"
          git push origin "HEAD:${TAP_BRANCH}"
